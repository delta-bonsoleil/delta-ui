<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>delta file viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #e6edf3; font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
#site-header { padding: 8px 14px; border-bottom: 1px solid #21262d; font-size: .8rem; color: #444; display: flex; align-items: center; gap: 10px; }
#site-header a { color: #8b949e; text-decoration: none; }
#site-header a:hover { color: #58a6ff; }
.header-title { color: #e6edf3; font-size: .9rem; }
#body { display: flex; flex: 1; overflow: hidden; }
#sidebar { width: 300px; flex-shrink: 0; border-right: 1px solid #21262d; display: flex; flex-direction: column; min-width: 160px; }
#search { padding: 8px; border-bottom: 1px solid #21262d; }
#search input { width: 100%; padding: 6px 10px; background: #161b22; border: 1px solid #30363d; border-radius: 5px; color: #e6edf3; font-size: .8rem; }
#filter-bar { display: flex; gap: 4px; padding: 6px 8px; border-bottom: 1px solid #21262d; }
.filter-btn { flex: 1; padding: 3px; border: 1px solid #333; border-radius: 4px; background: #0d1117; color: #666; cursor: pointer; font-size: .7rem; }
.filter-btn.active { background: #1f3a5f; color: #58a6ff; border-color: #1f6feb; }
#sort-bar { display: flex; gap: 3px; padding: 4px 8px; border-bottom: 1px solid #21262d; flex-wrap: wrap; }
.sort-btn { padding: 2px 6px; border: 1px solid #222; border-radius: 3px; background: #0d1117; color: #555; cursor: pointer; font-size: .65rem; }
.sort-btn.active { color: #58a6ff; border-color: #1f6feb; }
#count { padding: 4px 12px; font-size: .7rem; color: #555; border-bottom: 1px solid #21262d; }
#file-list { flex: 1; overflow-y: auto; }
.file-item { padding: 7px 12px; cursor: pointer; border-bottom: 1px solid #161b22; font-size: .8rem; }
.file-item:hover { background: #161b22; }
.file-item.active { background: #1f3a5f; }
.file-name { color: #e6edf3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-bottom: 2px; }
.file-meta { font-size: .68rem; color: #555; margin-top: 2px; }
.badge { font-size: .65rem; padding: 1px 5px; border-radius: 3px; margin-left: 4px; font-family: monospace; }
.badge-md   { background: #1a3a2a; color: #3fb950; border: 1px solid #238636; }
.badge-json,.badge-jsonl { background: #1a2a3a; color: #58a6ff; border: 1px solid #1f6feb; }
.badge-jpg,.badge-jpeg,.badge-png,.badge-gif,.badge-webp { background: #3a1a2a; color: #e879a0; border: 1px solid #8b3f6f; }
.badge-txt  { background: #2a2a1a; color: #e3b341; border: 1px solid #9e6a03; }
#divider { width: 5px; background: #161b22; cursor: col-resize; flex-shrink: 0; transition: background .1s; }
#divider:hover, #divider.dragging { background: #58a6ff; }
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
#main-header { padding: 8px 16px; border-bottom: 1px solid #21262d; font-size: .75rem; color: #555; background: #0d1117; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#content { flex: 1; overflow-y: auto; padding: 20px; }
#md-body h1,#md-body h2,#md-body h3 { color: #e6edf3; margin: 1em 0 .5em; }
#md-body p { line-height: 1.7; margin-bottom: .8em; color: #c9d1d9; }
#md-body code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: .85em; color: #79c0ff; }
#md-body pre { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 12px; overflow-x: auto; margin-bottom: 1em; }
#md-body pre code { background: none; padding: 0; }
#md-body ul,#md-body ol { padding-left: 1.5em; margin-bottom: .8em; color: #c9d1d9; }
#md-body blockquote { border-left: 3px solid #30363d; padding-left: 12px; color: #8b949e; margin-bottom: .8em; }
#md-body hr { border: none; border-top: 1px solid #21262d; margin: 1.5em 0; }
#json-body { font-family: monospace; font-size: .82em; line-height: 1.6; color: #c8e0f0; white-space: pre-wrap; word-break: break-all; }
#img-body img { max-width: 100%; border-radius: 6px; }
#placeholder { text-align: center; color: #333; margin-top: 20vh; font-size: 1rem; }
#action-bar { padding: 8px 16px; border-bottom: 1px solid #21262d; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
#action-bar button { padding: 4px 10px; border: 1px solid #30363d; border-radius: 4px; background: #161b22; color: #8b949e; cursor: pointer; font-size: .75rem; }
#action-bar button:hover { border-color: #58a6ff; color: #58a6ff; }
#action-bar .btn-danger:hover { border-color: #e74c3c; color: #e74c3c; }
#action-bar .btn-save { background: #1a4a2a; border-color: #238636; color: #3fb950; }
#edit-area { width: 100%; min-height: 300px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c8e0f0; font-family: monospace; font-size: .85em; padding: 12px; resize: vertical; outline: none; line-height: 1.6; margin-bottom: 8px; }
</style>
</head>
<body>
<div id="site-header">
  <a href="/tools/"><i class="fa fa-chevron-left"></i> DELTA</a>
  <span class="header-title"><i class="fa fa-folder-open"></i> File Viewer</span>
</div>
<div id="body">
<div id="sidebar">
  <div id="search"><input id="q" type="text" placeholder="検索..." oninput="renderList()"></div>
  <div id="filter-bar">
    <button class="filter-btn active" data-f="all" onclick="setFilter('all')">ALL</button>
    <button class="filter-btn" data-f="md" onclick="setFilter('md')"><i class="fa fa-file-lines"></i> md</button>
    <button class="filter-btn" data-f="image" onclick="setFilter('image')"><i class="fa fa-image"></i> img</button>
    <button class="filter-btn" data-f="json" onclick="setFilter('json')"><i class="fa fa-code"></i> json</button>
  </div>
  <div id="sort-bar">
    <button class="sort-btn active" data-s="path" onclick="setSort('path')">パス</button>
    <button class="sort-btn" data-s="name" onclick="setSort('name')">名前</button>
    <button class="sort-btn" data-s="ext" onclick="setSort('ext')">mime</button>
    <button class="sort-btn" data-s="size" onclick="setSort('size')">サイズ</button>
    <button class="sort-btn" data-s="ctime" onclick="setSort('ctime')">作成日</button>
    <button class="sort-btn" data-s="mtime" onclick="setSort('mtime')">更新日</button>
  </div>
  <div id="count"></div>
  <div id="file-list"></div>
</div>
<div id="divider"></div>
<div id="main">
  <div id="main-header">ファイルを選択してください</div>
  <div id="action-bar" style="display:none">
    <button onclick="optimizeImage()" id="optimizeBtn" style="display:none"><i class="fa fa-compress"></i> 軽量化</button>
    <button onclick="startEdit()" id="editBtn"><i class="fa fa-pen"></i> 編集</button>
    <button onclick="saveEdit()" id="saveBtn" class="btn-save" style="display:none"><i class="fa fa-save"></i> 保存</button>
    <button onclick="cancelEdit()" id="cancelBtn" style="display:none"><i class="fa fa-times"></i> キャンセル</button>
    <button onclick="startRename()" id="renameBtn"><i class="fa fa-i-cursor"></i> リネーム</button>
    <button onclick="uploadToDir()" id="uploadBtn"><i class="fa fa-upload"></i> アップロード</button>
    <input type="file" id="uploadInput" style="display:none" onchange="doUpload(this)">
    <button onclick="deleteFile()" id="deleteBtn" class="btn-danger"><i class="fa fa-trash"></i> 削除</button>
  </div>
  <div id="content">
    <div id="placeholder"><i class="fa fa-file" style="font-size:2rem;margin-bottom:12px;display:block"></i>ファイルを選択</div>
    <div id="md-body" style="display:none"></div>
    <div id="json-body" style="display:none"></div>
    <div id="img-body" style="display:none"></div>
    <textarea id="edit-area" style="display:none"></textarea>
  </div>
</div>
</div>

<script>
let allFiles = [], currentFilter = 'all', currentSort = 'path', sortAsc = true;

async function init() {
  const r = await fetch('/api/files');
  allFiles = await r.json();
  renderList();
  const p = new URLSearchParams(location.search).get('path');
  if (p) { const i = allFiles.findIndex(f => f.path === p); if (i >= 0) openFile(i); }
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.f === f));
  renderList();
}

function setSort(s) {
  if (currentSort === s) sortAsc = !sortAsc;
  else { currentSort = s; sortAsc = true; }
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.s === s));
  renderList();
}

function getType(ext) {
  if (ext === 'md') return 'md';
  if (['json','jsonl'].includes(ext)) return 'json';
  if (['jpg','jpeg','png','gif','webp'].includes(ext)) return 'image';
  return 'other';
}

function sortFiles(files) {
  return [...files].sort((a, b) => {
    let va, vb;
    if (currentSort === 'name') { va = a.name; vb = b.name; }
    else if (currentSort === 'path') { va = a.path; vb = b.path; }
    else if (currentSort === 'mtime') { va = a.mtime; vb = b.mtime; }
    else if (currentSort === 'ctime') { va = a.ctime; vb = b.ctime; }
    else if (currentSort === 'size') { va = a.size; vb = b.size; }
    else if (currentSort === 'ext') { va = a.ext; vb = b.ext; }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

function fmtSize(b) {
  if (b < 1024) return b + 'B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + 'KB';
  return (b/1024/1024).toFixed(1) + 'MB';
}
function fmtDate(ms) {
  const d = new Date(ms);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function renderList() {
  const q = document.getElementById('q').value.toLowerCase();
  const filtered = allFiles.filter(f => {
    if (currentFilter !== 'all' && getType(f.ext) !== currentFilter) return false;
    return f.name.toLowerCase().includes(q) || f.path.toLowerCase().includes(q);
  });
  const sorted = sortFiles(filtered);
  document.getElementById('count').textContent = `${sorted.length} files`;
  document.getElementById('file-list').innerHTML = sorted.map((f, si) => {
    const i = allFiles.indexOf(f);
    const same = Math.abs(f.mtime - f.ctime) < 2;
    const dateMeta = same
      ? `<span style="color:#555">作成: ${fmtDate(f.ctime)}</span>`
      : `<span style="color:#555">作成: ${fmtDate(f.ctime)}</span> · <span style="color:#888">更新: ${fmtDate(f.mtime)}</span>`;
    return `<div class="file-item" onclick="openFile(${i})">
      <div class="file-name">${f.name}<span class="badge badge-${f.ext}">${f.ext}</span></div>
      <div class="file-meta">${fmtSize(f.size)} · ${dateMeta} <span style="color:#2a2a2a">${f.root}/${f.dir}</span></div>
    </div>`;
  }).join('');
}

async function openFile(i) {
  const f = allFiles[i];
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
  // ソート済み表示リストの中でのインデックスでactive付与
  const q2 = document.getElementById('q').value.toLowerCase();
  const currentSorted = sortFiles(allFiles.filter(x => {
    if (currentFilter !== 'all' && getType(x.ext) !== currentFilter) return false;
    return x.name.toLowerCase().includes(q2) || x.path.toLowerCase().includes(q2);
  }));
  const si = currentSorted.indexOf(f);
  document.querySelectorAll('.file-item')[si]?.classList.add('active');

  // パンくずリンク生成
  const parts = f.path.split('/').filter(Boolean);
  const breadcrumb = parts.map((p, i) => {
    const fullPath = '/' + parts.slice(0, i+1).join('/');
    const isLast = i === parts.length - 1;
    if (isLast) return '<span style="color:#e6edf3">' + p + '</span>';
    return '<a href="#" onclick="filterByDir(\'' + fullPath + '\');return false" style="color:#58a6ff;text-decoration:none">' + p + '</a>';
  }).join('<span style="color:#333"> / </span>');
  document.getElementById('main-header').innerHTML = breadcrumb;
  // action-bar表示 + 編集可否判定
  document.getElementById('action-bar').style.display = 'flex';
  cancelEdit();
  const editable = ['md','txt','json','jsonl'].includes(f.ext);
  const isImage = ['jpg','jpeg','png','webp'].includes(f.ext);
  document.getElementById('editBtn').style.display = editable ? '' : 'none';
  document.getElementById('optimizeBtn').style.display = isImage ? '' : 'none';
  currentFilePath = f.path;
  history.pushState(null, '', `?path=${encodeURIComponent(f.path)}`);

  ['placeholder','md-body','json-body','img-body'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });

  const imgExts = ['jpg','jpeg','png','gif','webp'];
  if (imgExts.includes(f.ext)) {
    document.getElementById('img-body').innerHTML = `<img src="/api/file?path=${encodeURIComponent(f.path)}">`;
    document.getElementById('img-body').style.display = 'block';
    return;
  }

  const res = await fetch(`/api/file?path=${encodeURIComponent(f.path)}`);
  const text = await res.text();

  if (f.ext === 'md') {
    document.getElementById('md-body').innerHTML = renderMd(text);
    document.getElementById('md-body').style.display = 'block';
  } else {
    document.getElementById('json-body').textContent = text;
    document.getElementById('json-body').style.display = 'block';
  }
}

function renderMd(md) {
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/^(?!<[hbuli]|<hr|<bl)(.+)$/gm,'<p>$1</p>');
}

let currentFilePath = null;
let editing = false;

function startEdit() {
  if (!currentFilePath) return;
  const src = document.getElementById('md-body').style.display !== 'none'
    ? document.getElementById('md-body').innerText
    : document.getElementById('json-body').textContent;
  // 元テキストを取得してedit-areaに
  fetch('/api/file?path=' + encodeURIComponent(currentFilePath))
    .then(r => r.text()).then(t => {
      document.getElementById('edit-area').value = t;
      document.getElementById('edit-area').style.display = 'block';
      document.getElementById('md-body').style.display = 'none';
      document.getElementById('json-body').style.display = 'none';
      document.getElementById('editBtn').style.display = 'none';
      document.getElementById('saveBtn').style.display = '';
      document.getElementById('cancelBtn').style.display = '';
      editing = true;
    });
}

async function saveEdit() {
  const content = document.getElementById('edit-area').value;
  const r = await fetch('/api/file/save', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({path: currentFilePath, content}) });
  const d = await r.json();
  if (d.ok) { cancelEdit(); openFile(allFiles.findIndex(f => f.path === currentFilePath)); }
  else alert('保存失敗: ' + d.error);
}

function cancelEdit() {
  document.getElementById('edit-area').style.display = 'none';
  document.getElementById('saveBtn').style.display = 'none';
  document.getElementById('cancelBtn').style.display = 'none';
  // editBtnの表示はopenFile側で制御するのでここでは触らない
  editing = false;
}

async function startRename() {
  if (!currentFilePath) return;
  const name = prompt('新しいファイル名:', currentFilePath.split('/').pop());
  if (!name || name === currentFilePath.split('/').pop()) return;
  const r = await fetch('/api/file/rename', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({path: currentFilePath, name}) });
  const d = await r.json();
  if (d.ok) { const r2 = await fetch('/api/files'); allFiles = await r2.json(); renderList(); }
  else alert('リネーム失敗: ' + d.error);
}

async function deleteFile() {
  if (!currentFilePath) return;
  if (!confirm(currentFilePath.split('/').pop() + ' を削除しますか？')) return;
  const r = await fetch('/api/file/delete', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({path: currentFilePath}) });
  const d = await r.json();
  if (d.ok) {
    currentFilePath = null;
    document.getElementById('action-bar').style.display = 'none';
    document.getElementById('main-header').textContent = 'ファイルを選択してください';
    ['placeholder','md-body','json-body','img-body','edit-area'].forEach(id => document.getElementById(id).style.display = id === 'placeholder' ? 'block' : 'none');
    const r2 = await fetch('/api/files'); allFiles = await r2.json(); renderList();
  } else alert('削除失敗: ' + d.error);
}

function uploadToDir() {
  document.getElementById('uploadInput').click();
}

async function doUpload(input) {
  const file = input.files[0];
  if (!file || !currentFilePath) return;
  const dir = currentFilePath.substring(0, currentFilePath.lastIndexOf('/'));
  const fd = new FormData();
  fd.append('file', file);
  const r = await fetch('/api/file/upload?dir=' + encodeURIComponent(dir), { method: 'POST', body: fd });
  const d = await r.json();
  if (d.ok) { const r2 = await fetch('/api/files'); allFiles = await r2.json(); renderList(); input.value = ''; }
  else alert('アップロード失敗: ' + d.error);
}

async function optimizeImage() {
  if (!currentFilePath) return;
  const maxWidth = prompt('最大幅（px）空白=変更なし:', '1280');
  if (maxWidth === null) return;
  const quality = prompt('品質（1-100）:', '80');
  if (quality === null) return;
  const r = await fetch('/api/file/optimize', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ path: currentFilePath, maxWidth: maxWidth || null, quality: parseInt(quality) || 80 })
  });
  const d = await r.json();
  if (d.ok) {
    const saved = (d.saved / 1024).toFixed(1);
    const pct = Math.round((1 - d.after/d.before) * 100);
    alert('軽量化完了！ ' + pct + '% 削減 (' + saved + 'KB 節約)');
    openFile(allFiles.findIndex(f => f.path === currentFilePath));
  } else alert('失敗: ' + d.error);
}

function filterByDir(dir) {
  document.getElementById('q').value = dir;
  renderList();
}

// ドラッガブル区切り線
const divider = document.getElementById('divider');
const sidebar = document.getElementById('sidebar');
let dragging = false, startX, startW;

divider.addEventListener('mousedown', e => {
  dragging = true; startX = e.clientX; startW = sidebar.offsetWidth;
  divider.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const w = Math.max(160, Math.min(600, startW + e.clientX - startX));
  sidebar.style.width = w + 'px';
});
document.addEventListener('mouseup', () => {
  dragging = false;
  divider.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

init();
</script>

<style>
#chat-fab { position: fixed; bottom: 24px; right: 24px; width: 52px; height: 52px; background: #58a6ff; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(88,166,255,.4); z-index: 1000; transition: transform .2s; }

#chat-box.open { display: flex; }
#chat-header { padding: 12px 14px; background: #0d1117; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 8px; font-size: .85rem; color: #58a6ff; font-weight: 600; }
#chat-header span { flex: 1; }
#chat-close { background: none; border: none; color: #555; cursor: pointer; font-size: 1rem; }
#chat-close:hover { color: #e6edf3; }
#chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.chat-msg { max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: .82rem; line-height: 1.5; }
.chat-msg.user { background: #1f3a5f; color: #c8e0f0; align-self: flex-end; border-bottom-right-radius: 3px; }
.chat-msg.bot { background: #21262d; color: #c9d1d9; align-self: flex-start; border-bottom-left-radius: 3px; }
.chat-msg.bot.thinking { color: #555; font-style: italic; }

#chat-input { flex: 1; padding: 7px 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: .82rem; resize: none; outline: none; }
#chat-input:focus { border-color: #58a6ff; }

#chat-send:hover { background: #2ea043; }
#chat-send:disabled { background: #333; }
</style>

<button id="chat-fab" onclick="toggleChat()"><i class="fa fa-message"></i></button>
<div id="chat-box">
  <div id="chat-header">
    <i class="fa fa-terminal"></i>
    <span>DELTA</span>
    <button id="chat-close" onclick="toggleChat()"><i class="fa fa-times"></i></button>
  </div>
  <div id="chat-messages">
    <div class="chat-msg bot">こんにちは。DELTAです。何を調べますか？</div>
  </div>
  <div id="chat-input-area">
    <textarea id="chat-input" rows="1" placeholder="メッセージを入力..." onkeydown="chatKeydown(event)"></textarea>
    <button id="chat-send" onclick="sendChat()"><i class="fa fa-paper-plane"></i></button>
  </div>
</div>

<script>
let chatHistory = [];
let chatOpen = false;

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-box').classList.toggle('open', chatOpen);
  if (chatOpen) document.getElementById('chat-input').focus();
}

function chatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  const msgs = document.getElementById('chat-messages');
  const userEl = document.createElement('div');
  userEl.className = 'chat-msg user';
  userEl.textContent = msg;
  msgs.appendChild(userEl);

  const thinkEl = document.createElement('div');
  thinkEl.className = 'chat-msg bot thinking';
  thinkEl.textContent = '考え中...';
  msgs.appendChild(thinkEl);
  msgs.scrollTop = msgs.scrollHeight;

  document.getElementById('chat-send').disabled = true;
  chatHistory.push({ role: 'user', content: msg });

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, history: chatHistory.slice(-6) })
    });
    const d = await r.json();
    thinkEl.className = 'chat-msg bot';
    thinkEl.textContent = d.reply || d.error || 'エラーが発生しました';
    chatHistory.push({ role: 'assistant', content: d.reply || '' });
  } catch(e) {
    thinkEl.className = 'chat-msg bot';
    thinkEl.textContent = 'エラー: ' + e.message;
  }
  document.getElementById('chat-send').disabled = false;
  msgs.scrollTop = msgs.scrollHeight;
}
</script>

</body>
</html>
