<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>delta tgport viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #e6edf3; font-family: system-ui, sans-serif; }
#site-header { padding: 8px 14px; border-bottom: 1px solid #21262d; font-size: .8rem; display: flex; align-items: center; gap: 10px; }
#site-header a { color: #8b949e; text-decoration: none; }
#site-header a:hover { color: #58a6ff; }
#main { display: flex; height: calc(100vh - 37px); overflow: hidden; }
#sidebar { width: 240px; flex-shrink: 0; border-right: 1px solid #21262d; display: flex; flex-direction: column; }
#file-list { flex: 1; overflow-y: auto; }
.file-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #161b22; font-size: .78rem; }
.file-item:hover { background: #161b22; }
.file-item.active { background: #1f3a5f; }
.file-name { color: #e6edf3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-meta { font-size: .68rem; color: #555; margin-top: 2px; }
#content { flex: 1; overflow-y: auto; padding: 20px; }
#placeholder { text-align: center; color: #333; margin-top: 20vh; }

/* サマリーカード */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.summary-card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 14px; }
.summary-card .val { font-size: 1.4rem; font-weight: 700; color: #58a6ff; }
.summary-card .lbl { font-size: .72rem; color: #555; margin-top: 2px; }

/* コスト上位 */
.section-title { font-size: .85rem; color: #8b949e; margin: 16px 0 8px; border-bottom: 1px solid #21262d; padding-bottom: 6px; }
.cost-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: .78rem; }
.cost-bar .bar { height: 8px; background: #58a6ff; border-radius: 4px; }
.cost-bar .amount { color: #58a6ff; font-weight: 600; width: 55px; text-align: right; flex-shrink: 0; }
.cost-bar .prompt { color: #8b949e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

/* ツール使用 */
.tool-tag { display: inline-block; padding: 2px 8px; border-radius: 12px; background: #1a2a3a; color: #58a6ff; border: 1px solid #1f6feb; font-size: .72rem; margin: 2px; }

/* 会話ログ */
.turn { border-bottom: 1px solid #21262d; padding: 12px 0; }
.turn-meta { font-size: .7rem; color: #444; margin-bottom: 6px; display: flex; gap: 12px; }
.turn-meta .cost { color: #e3b341; }
.turn-meta .tools-used { color: #7ee787; }
.bubble-user { background: #1f3a5f; border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; font-size: .82rem; color: #c8e0f0; }
.bubble-bot { background: #161b22; border-radius: 8px; padding: 8px 12px; font-size: .82rem; color: #c9d1d9; line-height: 1.6; }
.bubble-bot pre { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 8px; overflow-x: auto; margin: 4px 0; font-size: .78em; }
.bubble-bot code { background: #0d1117; padding: 1px 4px; border-radius: 3px; font-size: .85em; color: #79c0ff; }

/* フィルター */
.filter-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.filter-bar input { padding: 5px 10px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: .8rem; width: 200px; }
.filter-btn { padding: 4px 10px; border: 1px solid #30363d; border-radius: 4px; background: #161b22; color: #666; cursor: pointer; font-size: .75rem; }
.filter-btn.active { background: #1f3a5f; color: #58a6ff; border-color: #1f6feb; }
.tab-bar { display: flex; gap: 2px; margin-bottom: 16px; border-bottom: 1px solid #21262d; }
.tab { padding: 7px 16px; cursor: pointer; font-size: .82rem; color: #555; border-bottom: 2px solid transparent; }
.tab:hover { color: #8b949e; }
.tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
</style>
</head>
<body>
<div id="site-header">
  <a href="/tools/"><i class="fa fa-chevron-left"></i> DELTA</a>
  <span style="color:#e6edf3"><i class="fa fa-chart-line"></i> tgport viewer</span>
</div>
<div id="main">
<div id="sidebar">
  <div style="padding:8px;border-bottom:1px solid #21262d;font-size:.72rem;color:#555">会話ログ</div>
  <div id="file-list"></div>
</div>
<div id="content">
  <div id="placeholder"><i class="fa fa-message" style="font-size:2rem;margin-bottom:12px;display:block"></i>ログファイルを選択</div>
  <div id="viewer" style="display:none">
    <div class="tab-bar">
      <div class="tab active" onclick="showTab('summary')">サマリー</div>
      <div class="tab" onclick="showTab('log')">会話ログ</div>
    </div>
    <div id="tab-summary"></div>
    <div id="tab-log" style="display:none"></div>
  </div>
</div>
</div>

<script>
let logData = [];
let currentTab = 'summary';

async function init() {
  const r = await fetch('/api/files');
  const files = await r.json();
  const logFiles = files.filter(f => f.path.includes('tgport') && (f.ext === 'jsonl' || f.ext === 'json' || f.ext === 'log'));
  const list = document.getElementById('file-list');
  list.innerHTML = logFiles.map((f, i) => `
    <div class="file-item" onclick="loadLog('${f.path}', this)">
      <div class="file-name">${f.name}</div>
      <div class="file-meta">${fmtSize(f.size)} · ${fmtDate(f.mtime)}</div>
    </div>`).join('');

  // URLパラメータ
  const p = new URLSearchParams(location.search).get('path');
  if (p) {
    const el = [...list.querySelectorAll('.file-item')].find((el, i) => logFiles[i]?.path === p);
    if (el) loadLog(p, el);
  }
}

function fmtSize(b) {
  if (b < 1024) return b + 'B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + 'KB';
  return (b/1024/1024).toFixed(1) + 'MB';
}
function fmtDate(ms) {
  const d = new Date(ms);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

async function loadLog(path, el) {
  document.querySelectorAll('.file-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  history.pushState(null, '', `?path=${encodeURIComponent(path)}`);

  const r = await fetch(`/api/file?path=${encodeURIComponent(path)}`);
  const text = await r.text();
  logData = text.trim().split('\n').filter(Boolean).map(l => { try { return JSON.parse(l); } catch { return null; } }).filter(Boolean);

  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('viewer').style.display = 'block';
  showTab(currentTab);
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent === (tab === 'summary' ? 'サマリー' : '会話ログ')));
  document.getElementById('tab-summary').style.display = tab === 'summary' ? 'block' : 'none';
  document.getElementById('tab-log').style.display = tab === 'log' ? 'block' : 'none';
  if (tab === 'summary') renderSummary();
  else renderLog();
}

function renderSummary() {
  const responses = logData.filter(l => l.event === 'response' || (!l.event && l.cost_usd));
  const requests = logData.filter(l => l.event === 'request' || (!l.event && l.prompt));
  const total = Math.max(requests.length, responses.length);
  const totalCost = responses.reduce((s, l) => s + parseFloat(l.cost_usd || 0), 0);
  const avgCost = total ? totalCost / total : 0;
  const toolCounts = {};
  responses.forEach(l => (l.tools || []).forEach(t => { toolCounts[t] = (toolCounts[t] || 0) + 1; }));
  const maxCost = Math.max(...responses.map(l => parseFloat(l.cost_usd || 0)));

  // コスト上位10（requestとペアにする）
  const reqMap = {};
  requests.forEach((r, i) => { reqMap[i] = r; });
  const top10 = [...responses].sort((a, b) => parseFloat(b.cost_usd||0) - parseFloat(a.cost_usd||0)).slice(0, 10);

  document.getElementById('tab-summary').innerHTML = `
    <div class="summary-grid">
      <div class="summary-card"><div class="val">${total}</div><div class="lbl">総ターン数</div></div>
      <div class="summary-card"><div class="val">¥${Math.round(totalCost * 150).toLocaleString()}</div><div class="lbl">総コスト</div></div>
      <div class="summary-card"><div class="val">¥${Math.round(avgCost * 150)}</div><div class="lbl">平均コスト/ターン</div></div>
      <div class="summary-card"><div class="val">¥${Math.round(maxCost * 150)}</div><div class="lbl">最大コスト/ターン</div></div>
    </div>

    <div class="section-title"><i class="fa fa-fire"></i> コスト上位ターン</div>
    ${top10.map((l, i) => {
      const cost = parseFloat(l.cost_usd || 0);
      const pct = maxCost > 0 ? (cost / maxCost * 100).toFixed(0) : 0;
      // 対応するrequestを時系列で探す（responseの直前のrequest）
      const resIdx = logData.indexOf(l);
      let prompt = '';
      for (let j = resIdx - 1; j >= 0; j--) {
        if (logData[j].event === 'request') { prompt = logData[j].prompt || ''; break; }
      }
      prompt = (prompt || l.prompt || '').slice(0, 60);
      return `<div class="cost-bar">
        <span class="amount">¥${Math.round(cost*150)}</span>
        <div class="bar" style="width:${pct}%;min-width:4px"></div>
        <span class="prompt">${escHtml(prompt)}</span>
      </div>`;
    }).join('')}

    ${Object.keys(toolCounts).length ? `
    <div class="section-title"><i class="fa fa-wrench"></i> ツール使用統計</div>
    <div>${Object.entries(toolCounts).sort((a,b)=>b[1]-a[1]).map(([t,n]) => `<span class="tool-tag">${t} × ${n}</span>`).join('')}</div>
    ` : ''}
  `;
}

function buildTurns() {
  const turns = [];
  let current = null;
  for (const l of logData) {
    if (l.event === 'request') {
      if (current) turns.push(current);
      current = { request: l, events: [], response: null };
    } else if (l.event === 'response') {
      if (current) { current.response = l; turns.push(current); current = null; }
      else turns.push({ request: null, events: [], response: l });
    } else if (l.event === 'tool_use' || l.event === 'text_delta') {
      if (current) current.events.push(l);
    } else if (!l.event && l.prompt !== undefined) {
      // 旧形式
      turns.push({ request: l, events: [], response: l });
    }
  }
  if (current) turns.push(current);
  return turns;
}

function renderLog(q = '') {
  const turns = buildTurns();
  const filtered = q ? turns.filter(t => {
    const text = (t.request?.prompt || '') + (t.response?.response || '');
    return text.toLowerCase().includes(q.toLowerCase());
  }) : turns;

  document.getElementById('tab-log').innerHTML = `
    <div class="filter-bar">
      <input type="text" placeholder="会話を検索..." oninput="renderLog(this.value)" value="${escHtml(q)}">
      <span style="font-size:.75rem;color:#555">${filtered.length} / ${turns.length} ターン</span>
    </div>
    ${filtered.map(t => {
      const req = t.request;
      const res = t.response;
      const ts = req?.ts ? new Date(req.ts).toLocaleString('ja-JP') : '';
      const cost = res?.cost_usd ? `¥${Math.round(parseFloat(res.cost_usd) * 150)}` : '';
      const prompt = req?.prompt || '';
      const response = res?.response || '';

      // ツール使用・中間テキストブロック
      const eventBlocks = t.events.map(e => {
        if (e.event === 'tool_use') {
          return `<div style="margin:4px 0;padding:4px 8px;background:#1a2a1a;border-left:3px solid #7ee787;border-radius:4px;font-size:.73rem;color:#7ee787">
            <i class="fa fa-wrench"></i> <strong>${e.tool}</strong>
            <span style="color:#555;margin-left:6px">${escHtml((typeof e.input === 'string' ? e.input : JSON.stringify(e.input)||'').slice(0,80))}</span>
          </div>`;
        } else if (e.event === 'text_delta') {
          return `<div style="margin:4px 0;padding:4px 8px;background:#1a1a2a;border-left:3px solid #8b949e;border-radius:4px;font-size:.73rem;color:#8b949e">
            <i class="fa fa-comment-dots"></i> ${escHtml((e.text||'').slice(0,100))}
          </div>`;
        }
        return '';
      }).join('');

      return `<div class="turn">
        <div class="turn-meta">
          <span>${ts}</span>
          ${cost ? `<span class="cost"><i class="fa fa-yen-sign"></i> ${cost}</span>` : ''}
          ${t.events.filter(e=>e.event==='tool_use').length ? `<span class="tools-used"><i class="fa fa-wrench"></i> ${t.events.filter(e=>e.event==='tool_use').map(e=>e.tool).join(', ')}</span>` : ''}
        </div>
        ${prompt ? `<div class="bubble-user">${escHtml(prompt)}</div>` : ''}
        ${eventBlocks}
        ${response ? `<div class="bubble-bot">${renderMd(response)}</div>` : ''}
      </div>`;
    }).join('')}
  `;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMd(s) {
  return escHtml(s)
    .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

init();
</script>
</body>
</html>
