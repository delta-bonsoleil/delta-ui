<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELTA — bon-soleil Helsinki</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #e6edf3; font-family: system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.container { text-align: center; padding: 40px 20px; }
.logo { font-size: 3rem; font-weight: 700; letter-spacing: .2em; color: #58a6ff; margin-bottom: 4px; }
.sub { font-size: .85rem; color: #444; letter-spacing: .15em; margin-bottom: 48px; }
.tools { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; max-width: 600px; margin: 0 auto; }
.tool-card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 28px 20px; text-decoration: none; color: #e6edf3; transition: border-color .2s, transform .2s; }
.tool-card:hover { border-color: #58a6ff; transform: translateY(-2px); }
.tool-card i { font-size: 2rem; margin-bottom: 12px; display: block; color: #58a6ff; }
.tool-card .name { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
.tool-card .desc { font-size: .75rem; color: #666; }
footer { margin-top: 60px; font-size: .7rem; color: #333; letter-spacing: .1em; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">DELTA</div>
  <div class="sub">bon-soleil Helsinki — lightweight tools</div>
  <div class="tools">
    <a href="/tools/files.html" class="tool-card">
      <i class="fa fa-folder-open"></i>
      <div class="name">File Viewer</div>
      <div class="desc">docs / assets ブラウザ</div>
    </a>
    <a href="/tools/image_gen.html" class="tool-card">
      <i class="fa fa-wand-magic-sparkles"></i>
      <div class="name">Image Gen</div>
      <div class="desc">Gemini API 画像生成</div>
    </a>
  </div>
  <footer>DELTA © bon-soleil Holdings</footer>
</div>
<!-- DELTAチャットウィジェット -->
<style>
#chat-fab { position: fixed; bottom: 24px; right: 24px; width: 52px; height: 52px; background: #58a6ff; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(88,166,255,.4); z-index: 1000; transition: transform .2s; }
#chat-fab:hover { transform: scale(1.08); }
#chat-fab i { font-size: 1.3rem; color: #0d1117; }
#chat-box { position: fixed; bottom: 88px; right: 24px; width: 340px; height: 460px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; display: none; flex-direction: column; z-index: 1000; box-shadow: 0 8px 32px rgba(0,0,0,.5); overflow: hidden; }
#chat-box.open { display: flex; }
#chat-header { padding: 12px 14px; background: #0d1117; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 8px; font-size: .85rem; color: #58a6ff; font-weight: 600; }
#chat-header span { flex: 1; }
#chat-close { background: none; border: none; color: #555; cursor: pointer; font-size: 1rem; }
#chat-close:hover { color: #e6edf3; }
#chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.chat-msg { max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: .82rem; line-height: 1.5; }
.chat-msg.user { background: #1f3a5f; color: #c8e0f0; align-self: flex-end; border-bottom-right-radius: 3px; }
.chat-msg.bot { background: #21262d; color: #c9d1d9; align-self: flex-start; border-bottom-left-radius: 3px; }
.chat-msg.bot.thinking { color: #555; font-style: italic; }
#chat-input-area { padding: 10px; border-top: 1px solid #21262d; display: flex; gap: 6px; }
#chat-input { flex: 1; padding: 7px 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: .82rem; resize: none; outline: none; }
#chat-input:focus { border-color: #58a6ff; }
#chat-send { padding: 7px 12px; background: #238636; border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: .8rem; }
#chat-send:hover { background: #2ea043; }
#chat-send:disabled { background: #333; }
</style>

<button id="chat-fab" onclick="toggleChat()"><i class="fa fa-message"></i></button>
<div id="chat-box">
  <div id="chat-header">
    <i class="fa fa-terminal"></i>
    <span>DELTA</span>
    <button id="chat-close" onclick="toggleChat()"><i class="fa fa-times"></i></button>
  </div>
  <div id="chat-messages">
    <div class="chat-msg bot">こんにちは。DELTAです。何を調べますか？</div>
  </div>
  <div id="chat-input-area">
    <textarea id="chat-input" rows="1" placeholder="メッセージを入力..." onkeydown="chatKeydown(event)"></textarea>
    <button id="chat-send" onclick="sendChat()"><i class="fa fa-paper-plane"></i></button>
  </div>
</div>

<script>
let chatHistory = [];
let chatOpen = false;

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-box').classList.toggle('open', chatOpen);
  if (chatOpen) document.getElementById('chat-input').focus();
}

function chatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); sendChat(); }
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  const msgs = document.getElementById('chat-messages');
  const userEl = document.createElement('div');
  userEl.className = 'chat-msg user';
  userEl.textContent = msg;
  msgs.appendChild(userEl);

  const thinkEl = document.createElement('div');
  thinkEl.className = 'chat-msg bot thinking';
  thinkEl.textContent = '考え中...';
  msgs.appendChild(thinkEl);
  msgs.scrollTop = msgs.scrollHeight;

  document.getElementById('chat-send').disabled = true;
  chatHistory.push({ role: 'user', content: msg });

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, history: chatHistory.slice(-6) })
    });
    const d = await r.json();
    thinkEl.className = 'chat-msg bot';
    thinkEl.textContent = d.reply || d.error || 'エラーが発生しました';
    chatHistory.push({ role: 'assistant', content: d.reply || '' });
  } catch(e) {
    thinkEl.className = 'chat-msg bot';
    thinkEl.textContent = 'エラー: ' + e.message;
  }
  document.getElementById('chat-send').disabled = false;
  msgs.scrollTop = msgs.scrollHeight;
}
</script>

</body>
</html>
